# ============================================================
#  netlify.toml  —  Proxies para SpreadGreg Quant Report
#  Coloca este archivo en la RAÍZ del repositorio (junto a index.html)
# ============================================================

# --- USDA NASS QuickStats ---
# El navegador llama a  /usda-api/?key=...&...  y Netlify lo reenvía a la API real.
[[redirects]]
  from = "/usda-api/*"
  to = "https://quickstats.nass.usda.gov/api/api_GET/:splat"
  status = 200
  force = true

# --- Yahoo Finance (endpoint primario) ---
[[redirects]]
  from = "/yahoo/*"
  to = "https://query1.finance.yahoo.com/:splat"
  status = 200
  force = true

# --- Yahoo Finance (endpoint secundario / respaldo) ---
[[redirects]]
  from = "/yahoo2/*"
  to = "https://query2.finance.yahoo.com/:splat"
  status = 200
  force = true

# No hay build: es un sitio estático de un solo archivo.
[build]
  publish = "."
