# =============================================================
#  netlify.toml — Informe Hogs and Pigs (datos en vivo)
#  Va en la RAÍZ del deploy, junto a index.html y diagnostico.html
#  NO usar _redirects (los archivos que empiezan con _ se ocultan
#  al descomprimir ZIPs en Mac/Windows y no llegan a Netlify).
# =============================================================

# ---- Proxy USDA NASS QuickStats (evita el bloqueo CORS) ----
[[redirects]]
  from = "/nass-api"
  to = "https://quickstats.nass.usda.gov/api/api_GET/"
  status = 200
  force = true

[[redirects]]
  from = "/nass-api/*"
  to = "https://quickstats.nass.usda.gov/api/api_GET/:splat"
  status = 200
  force = true

# ---- Proxy Yahoo Finance (Lean Hogs futures, HE=F) ----
[[redirects]]
  from = "/yahoo/*"
  to = "https://query1.finance.yahoo.com/:splat"
  status = 200
  force = true

# Fallback de Yahoo por si query1 limita las peticiones
[[redirects]]
  from = "/yahoo2/*"
  to = "https://query2.finance.yahoo.com/:splat"
  status = 200
  force = true
